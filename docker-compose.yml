services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chantrale
      POSTGRES_PASSWORD: chantrale
      POSTGRES_DB: chantrale
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U chantrale" ]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
